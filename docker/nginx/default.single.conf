server {
    listen 18080;
    server_name _;

    # 默认 1m 会导致后台多图/大图上传 413；需不小于 PHP post_max_size，并覆盖单次 multipart 总体积
    client_max_body_size 64m;

    root /var/www/html/public;
    index index.php;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # =======================================================
    # Reverb WebSocket 代理（HTTP + WS 同端口，Nginx 自动升级）
    # =======================================================
    # 健康检查（1Panel/Docker HEALTHCHECK 用）
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # WebSocket 连接入口：ws://host:18080/app/{REVERB_APP_KEY}
    location /app/ {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # WebSocket 长连接
    }

    # Reverb HTTP API（用于广播事件）：POST /apps/{REVERB_APP_ID}/events
    location /apps/ {
        proxy_pass http://127.0.0.1:18081;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =======================================================
    # 静态文件缓存
    # =======================================================
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|avif|ttf|otf|woff|woff2)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # =======================================================
    # PHP-FPM
    # =======================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_HOST $host:18080;
        fastcgi_param SERVER_PORT 18080;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_read_timeout 300;
        internal;
    }
}
